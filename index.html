<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Roblox Studio Store</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="navbar">

<div class="logo">Roblox Studio Store</div>

<div class="search-box">
<input id="searchInput" placeholder="에셋을 검색하세요">
</div>

<div class="nav-right">
<span id="userEmail"></span>

<button id="loginBtn">로그인</button>
<button id="logoutBtn" style="display:none;">로그아웃</button>

<button id="adminBtn" style="display:none;">상품 추가</button>
<button id="adminPanelBtn" style="display:none;">관리자 패널</button>
</div>

</header>


<section class="hero">
<div class="hero-text">
<h1>Roblox Studio Assets Marketplace</h1>
<p>로블록스 스튜디오 에셋을 공유하세요</p>
</div>
</section>


<section class="category-bar">

<button id="sortAll">전체</button>
<button id="sortPopular">인기</button>
<button id="sortLow">낮은 가격순</button>
<button id="sortHigh">높은 가격순</button>

</section>


<main class="container">

<div class="product-grid"></div>

</main>



<div id="productModal" class="modal">

<div class="modal-content">

<span id="modalClose">&times;</span>

<img id="modalImage">

<h2 id="modalName"></h2>

<p id="modalPrice"></p>

<input id="buyerPhone" placeholder="전화번호">
<input id="buyerDiscord" placeholder="디스코드 ID">

<button id="modalBuy">구매 요청</button>

</div>

</div>



<div id="adminModal" class="modal">

<div class="modal-content">

<span id="adminClose">&times;</span>

<h2>상품 추가</h2>

<input id="adminName" placeholder="상품 이름">
<input id="adminPrice" type="number" placeholder="가격">
<input id="adminImage" placeholder="이미지 URL">

<button id="adminUpload">상품 등록</button>

</div>

</div>



<div id="adminPanel" class="modal">

<div class="modal-content">

<span id="adminPanelClose">&times;</span>

<h2>구매 요청 목록</h2>

<div id="orderList"></div>

</div>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
