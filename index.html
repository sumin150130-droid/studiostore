<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>StudioStore</title>
  <meta name="description" content="로블록스 스튜디오 에셋 판매 사이트">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
  <div class="logo">StudioStore</div>

  <div class="nav-right">
    <span id="userEmail"></span>
    <button id="loginBtn">로그인</button>
    <button id="logoutBtn" style="display:none;">로그아웃</button>
  </div>
</header>

<main class="container">

  <h1>에셋 마켓</h1>
  <p class="subtitle">로블록스 스튜디오 에셋을 만나보세요.</p>

  <div class="filter-bar">
    <button>전체</button>
    <button>인기</button>
    <button>낮은 가격순</button>
    <button>높은 가격순</button>
  </div>

  <!-- 🔥 여기 안에 DB 상품이 자동으로 들어옴 -->
  <div class="product-grid"></div>

</main>

<!-- 🔥 Firebase + 모든 로직은 script.js 안에서만 -->
<script type="module" src="script.js"></script>

</body>
</html>
