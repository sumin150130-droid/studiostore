<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<title>StudioStore</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

</head>

<body>


<!-- ===== 상단바 ===== -->

<header class="navbar">

<div class="logo">로샵</div>

<div class="search-box">
<input id="searchInput" placeholder="원하는 상품을 찾아보세요">
</div>

<div class="nav-right">

<span id="userEmail"></span>

<button id="loginBtn">로그인</button>
<button id="logoutBtn" style="display:none;">로그아웃</button>

<button id="adminBtn" style="display:none;">상품추가</button>
<button id="adminPanelBtn" style="display:none;">관리자패널</button>

</div>

</header>



<!-- ===== 메인 배너 ===== -->

<section class="hero">

<div class="hero-text">

<h1>모든 개발자의 꿈이 빛나는 공간</h1>

<p>로샵 커뮤니티 이용자 수 6,000명 달성</p>

</div>

</section>



<!-- ===== 카테고리 버튼 ===== -->

<section class="category-bar">

<button id="sortAll">전체</button>
<button id="sortPopular">인기</button>
<button id="sortLow">낮은 가격순</button>
<button id="sortHigh">높은 가격순</button>

</section>



<!-- ===== 상품 ===== -->

<main class="container">

<div class="product-grid"></div>

</main>



<!-- ===== 상품 모달 ===== -->

<div id="productModal" class="modal">

<div class="modal-content">

<span id="modalClose">&times;</span>

<img id="modalImage">

<h2 id="modalName"></h2>

<p id="modalPrice"></p>
<p id="modalSales"></p>

<input id="buyerPhone" placeholder="전화번호">
<input id="buyerDiscord" placeholder="디스코드 ID">

<button id="modalBuy">구매 요청</button>

</div>

</div>



<!-- ===== 관리자 상품 추가 ===== -->

<div id="adminModal" class="modal">

<div class="modal-content">

<span id="adminClose">&times;</span>

<h2>상품 추가</h2>

<input id="adminName" placeholder="상품 이름">
<input id="adminPrice" type="number" placeholder="가격">
<input id="adminImage" placeholder="이미지 URL">

<button id="adminUpload">상품 등록</button>

</div>

</div>



<!-- ===== 관리자 패널 ===== -->

<div id="adminPanel" class="modal">

<div class="modal-content">

<span id="adminPanelClose">&times;</span>

<h2>구매 내역</h2>

<div id="orderList"></div>

</div>

</div>



<script type="module" src="script.js"></script>

</body>
</html>
